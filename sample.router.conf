# ─────────────────────────────────────────────────────────────────────────────
# router.conf  –  PHP Web Router Configuration
# ─────────────────────────────────────────────────────────────────────────────
# Lines starting with # are comments and are ignored.
# Blank lines are ignored.
#
# Sections are declared as [SectionName]
# ─────────────────────────────────────────────────────────────────────────────

[Settings]

# Domains managed by this router (comma-separated SLD.TLD pairs).
# Requests from hosts NOT matching these domains will receive a 404.
managed_domains = 7773.ch, t71.ch, natureforce.ch

# Maximum number of redirect hops allowed per request (safety limit).
# Default: 5
allowed_redirects = 5

# Enable request logging.
# Default: false
logging = true

# Path to the log file. Relative paths are relative to the script directory.
# Default: ./router.log
logfile = ./router.log

# Maximum number of lines kept in the log file.
# When exceeded, the oldest entries are removed automatically.
# Default: 1000
maxsize = 1000


# ─────────────────────────────────────────────────────────────────────────────
[Redirects]
# ─────────────────────────────────────────────────────────────────────────────
# Format per line:
#   pattern|target|type|preserve_path|preserve_query
#
# Fields:
#   pattern        – URL pattern to match (see below)
#   target         – Redirect destination URL
#   type           – 301 (permanent) or 302 (temporary)  [default: 302]
#   preserve_path  – Append original path to target      [default: true]
#   preserve_query – Append original query string        [default: true]
#
# Pattern formats:
#   subdomain              Plain subdomain, matched against ALL managed domains.
#                          e.g. "d6" matches d6.7773.ch, d6.t71.ch, d6.natureforce.ch
#
#   subdomain.sld.tld      Fully-qualified host, exact match only.
#                          e.g. "tools.t71.ch" matches only that host.
#
#   *.sub.sld.tld          Wildcard – matches any prefix.
#                          e.g. "*.dev.t71.ch" matches foo.dev.t71.ch, bar.dev.t71.ch
#
#   host/path              Host + path-prefix match.
#                          e.g. "www.t71.ch/old-path" matches that path on that host.
#
#   (empty)                Catch-all – matches everything (place last!).
#
# Rules are evaluated TOP-TO-BOTTOM. First match wins.
# ─────────────────────────────────────────────────────────────────────────────

